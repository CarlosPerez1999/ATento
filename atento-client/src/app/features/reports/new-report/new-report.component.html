<div class="max-w-4xl mx-auto h-full flex flex-col gap-6">
  
  <header>
    <a routerLink="/citizen/reports" class="text-blue-600 hover:text-blue-800 font-bold flex items-center gap-2 mb-4 w-fit transition-colors">
       <i class="pi pi-arrow-left"></i> Volver a mis reportes
    </a>
    <h1 class="text-3xl font-extrabold text-surface-900 tracking-tight">Crear Nuevo Reporte</h1>
    <p class="mt-1 uppercase text-xs font-bold tracking-widest text-blue-600">Formulario Sincronizado por Signals</p>
  </header>

  <div class="bg-white rounded-2xl shadow-sm border border-surface-200 p-6 md:p-10 flex flex-col gap-10">
      
      <section>
          <div class="flex items-center gap-3 mb-6">
             <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-700 font-black flex items-center justify-center italic">1</div>
             <h2 class="text-xl font-bold text-surface-900">¿Qué está pasando?</h2>
          </div>
          
          <div class="grid grid-cols-1 gap-6">
             <div class="flex flex-col gap-2">
                 <label for="title" class="font-bold text-surface-700 flex items-center gap-2">
                    <i class="pi pi-pencil text-blue-500"></i> Título del Incidente
                 </label>
                 <input pInputText id="title" type="text"
                        [ngModel]="title()" (ngModelChange)="title.set($event)" name="title"
                        placeholder="Ej: Bache profundo..." 
                        class="w-full rounded-xl p-4 border border-surface-300 focus:ring-4 focus:ring-blue-100 transition-shadow">
             </div>
             
             <div class="flex flex-col gap-2">
                 <label for="category" class="font-bold text-surface-700 flex items-center gap-2">
                    <i class="pi pi-tag text-blue-500"></i> Categoría
                 </label>
                 <p-select id="category" 
                           [ngModel]="category()" (ngModelChange)="category.set($event)" name="category"
                           [options]="categories" optionLabel="label" optionValue="value" 
                           placeholder="Seleccionar Categoría" 
                           styleClass="w-full rounded-xl border border-surface-300"></p-select>
             </div>
             
             <div class="flex flex-col gap-2">
                 <label for="description" class="font-bold text-surface-700 flex items-center gap-2">
                    <i class="pi pi-align-left text-blue-500"></i> Descripción Detallada
                 </label>
                 <textarea pTextarea id="description" 
                           [ngModel]="description()" (ngModelChange)="description.set($event)" name="description"
                           rows="4" placeholder="..." 
                           class="w-full rounded-xl p-4 border border-surface-300 focus:ring-4 focus:ring-blue-100 transition-shadow"></textarea>
             </div>
          </div>
      </section>

      <div class="flex flex-col-reverse md:flex-row md:justify-end gap-4 border-t border-surface-100 pt-8 mt-4">
         <button routerLink="/citizen/reports" type="button" pButton pRipple label="Cancelar" class="p-button-text p-button-secondary"></button>
         <button (click)="submitReport()" pButton pRipple label="Enviar Reporte Cívico" icon="pi pi-send" iconPos="right" [loading]="isSubmitting()" class="p-button-primary bg-blue-700 border-none font-bold rounded-xl px-12 py-4 shadow-lg hover:shadow-blue-500/30 transition-all"></button>
      </div>
  </div>
</div>
