<div class="flex h-screen bg-surface-50 overflow-hidden">
  <!-- Desktop Sidebar -->
  <aside class="hidden lg:flex w-20 hover:w-64 flex-col bg-white border-r border-surface-200 shadow-sm z-20 transition-all duration-300 ease-in-out group/sidebar overflow-hidden">
    <!-- Logo -->
    <div class="h-20 flex items-center px-6 border-b border-surface-100 mt-2 shrink-0">
      <i class="pi pi-map-marker text-3xl text-blue-700 min-w-[2rem]"></i>
      <span class="text-2xl font-black text-surface-900 tracking-tight opacity-0 group-hover/sidebar:opacity-100 transition-opacity duration-300 whitespace-nowrap ml-2">AT<span class="text-blue-700">ento</span></span>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 py-8 space-y-2 overflow-y-auto overflow-x-hidden">
      <a routerLink="/citizen/dashboard" routerLinkActive="bg-blue-50 text-blue-700 font-bold" [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center gap-4 px-4 py-3 rounded-xl text-surface-600 hover:bg-surface-100 hover:text-surface-900 transition-colors cursor-pointer group">
        <i class="pi pi-home text-xl group-hover:text-blue-600 transition-colors min-w-[1.25rem]"></i>
        <span class="whitespace-nowrap opacity-0 group-hover/sidebar:opacity-100 transition-opacity duration-300">Dashboard</span>
      </a>

      <a routerLink="/citizen/reports" routerLinkActive="bg-blue-50 text-blue-700 font-bold" 
         class="flex items-center gap-4 px-4 py-3 rounded-xl text-surface-600 hover:bg-surface-100 hover:text-surface-900 transition-colors cursor-pointer group">
        <i class="pi pi-list text-xl group-hover:text-blue-600 transition-colors min-w-[1.25rem]"></i>
        <span class="whitespace-nowrap opacity-0 group-hover/sidebar:opacity-100 transition-opacity duration-300">Mis Reportes</span>
      </a>
      
      <a routerLink="/citizen/profile" routerLinkActive="bg-blue-50 text-blue-700 font-bold" 
         class="flex items-center gap-4 px-4 py-3 rounded-xl text-surface-600 hover:bg-surface-100 hover:text-surface-900 transition-colors cursor-pointer group">
        <i class="pi pi-user text-xl group-hover:text-blue-600 transition-colors min-w-[1.25rem]"></i>
        <span class="whitespace-nowrap opacity-0 group-hover/sidebar:opacity-100 transition-opacity duration-300">Perfil</span>
      </a>
    </nav>

    <!-- User & Logout -->
    <div class="p-4 border-t border-surface-200 shrink-0">
      <div class="flex items-center gap-4 px-2 mb-4 overflow-hidden">
        <p-avatar [label]="(authService.currentUser()?.firstName?.charAt(0) || 'C') | uppercase" 
                  styleClass="bg-blue-100 text-blue-800 font-bold min-w-[2.5rem]" 
                  shape="circle"></p-avatar>
        <div class="flex flex-col opacity-0 group-hover/sidebar:opacity-100 transition-opacity duration-300 whitespace-nowrap">
          <span class="text-sm font-bold text-surface-900">{{ authService.currentUser()?.firstName || 'Ciudadano' }}</span>
          <span class="text-xs text-surface-500">Activo</span>
        </div>
      </div>
      <button pButton pRipple type="button" icon="pi pi-sign-out" 
        class="w-full text-left p-button-text p-button-secondary text-surface-600 bg-transparent hover:bg-surface-100 rounded-lg py-3 px-4 flex items-center gap-4"
        (click)="logout()">
        <span class="whitespace-nowrap opacity-0 group-hover/sidebar:opacity-100 transition-opacity duration-300">Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col h-screen overflow-hidden relative z-10">
    <!-- Mobile Header -->
    <header class="lg:hidden h-16 bg-white border-b border-surface-200 flex items-center justify-between px-4 z-20 shadow-sm">
      <div class="flex items-center gap-2">
        <i class="pi pi-map-marker text-2xl text-blue-700"></i>
        <span class="text-xl font-black text-surface-900 tracking-tight">AT<span class="text-blue-700">ento</span></span>
      </div>
      <p-avatar [label]="(authService.currentUser()?.firstName?.charAt(0) || 'C') | uppercase" styleClass="bg-blue-100 text-blue-800 font-bold" shape="circle" (click)="logout()"></p-avatar>
    </header>

    <!-- Router Outlet Context -->
    <div class="flex-1 overflow-auto p-4 lg:p-10 pb-24 lg:pb-10 bg-surface-50">
      <router-outlet></router-outlet>
    </div>
  </main>

  <!-- Mobile Bottom Navigation (Visible only on mobile/tablet) -->
  <nav class="lg:hidden fixed bottom-0 left-0 right-0 h-16 bg-white border-t border-surface-200 flex items-center justify-around px-2 z-50 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
    <a routerLink="/citizen/dashboard" routerLinkActive="text-blue-700" [routerLinkActiveOptions]="{exact: true}" class="flex flex-col items-center justify-center w-full h-full text-surface-500 hover:text-blue-600 transition-colors">
      <i class="pi pi-home text-xl mb-1"></i>
      <span class="text-[10px] font-bold">Inicio</span>
    </a>
    <a routerLink="/citizen/reports" routerLinkActive="text-blue-700" class="flex flex-col items-center justify-center w-full h-full text-surface-500 hover:text-blue-600 transition-colors">
      <i class="pi pi-list text-xl mb-1"></i>
      <span class="text-[10px] font-bold">Reportes</span>
    </a>
    <a routerLink="/citizen/profile" routerLinkActive="text-blue-700" class="flex flex-col items-center justify-center w-full h-full text-surface-500 hover:text-blue-600 transition-colors">
      <i class="pi pi-user text-xl mb-1"></i>
      <span class="text-[10px] font-bold">Perfil</span>
    </a>
  </nav>
</div>
